# devin-codeql-remediation.yml
# ============================================================================
# Trigger: Fires when a code_scanning_alert repository_dispatch event is received
#          (e.g. from a webhook), OR manually via workflow_dispatch with an alert number.
# Action:  Spins up a Devin session to triage and remediate the finding.
#
# SETUP (drop this file into any repo):
#   1. Copy this file to .github/workflows/devin-codeql-remediation.yml
#   2. Add these GitHub repository secrets:
#      - DEVIN_API_KEY   : Your Devin org API key (starts with cog_)
#      - DEVIN_ORG_ID    : Your Devin organization ID
#   3. (Optional) Set the DEVIN_PLAYBOOK_ID variable below to attach a playbook.
#   4. Ensure CodeQL is already running on this repo (GitHub Advanced Security).
#
# This workflow is language-agnostic and multi-repo safe. It reads the alert
# payload dynamically — no hardcoded paths, languages, or repo names.
# ============================================================================

name: "Devin: CodeQL Auto-Remediation"

on:
  repository_dispatch:
    types: [code_scanning_alert]
  workflow_dispatch:
    inputs:
      alert_number:
        description: "CodeQL alert number to remediate"
        required: true
        type: number

# Only one remediation session per alert at a time
concurrency:
  group: devin-codeql-${{ github.event.client_payload.alert_number || github.event.inputs.alert_number || github.run_id }}
  cancel-in-progress: false

permissions:
  issues: write
  security-events: read
  contents: read
  checks: write

env:
  DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
  DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
  DEVIN_PLAYBOOK_ID: ${{ vars.DEVIN_SECURITY_FIX_PLAYBOOK_ID }}
  MIN_SEVERITY: ${{ vars.DEVIN_MIN_SEVERITY }}
  BATCH_PR_MODE: ${{ vars.DEVIN_BATCH_PR_MODE }}
  BATCH_STRATEGY: ${{ vars.DEVIN_BATCH_STRATEGY }}
  MAX_ALERTS_PER_BATCH: ${{ vars.DEVIN_MAX_ALERTS_PER_BATCH }}

jobs:
  remediate:
    name: "Remediate CodeQL Alert"
    runs-on: ubuntu-latest

    steps:
      - name: Extract alert details
        id: alert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            ALERT_NUMBER="${{ github.event.client_payload.alert_number }}"
          else
            ALERT_NUMBER="${{ github.event.inputs.alert_number }}"
          fi

          if [ -z "$ALERT_NUMBER" ]; then
            echo "::error::No alert number provided"
            exit 1
          fi

          REPO="${{ github.repository }}"
          ALERT_JSON=$(curl -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/code-scanning/alerts/${ALERT_NUMBER}")
          RULE_ID=$(echo "$ALERT_JSON" | jq -r '.rule.id // empty')
          RULE_DESC=$(echo "$ALERT_JSON" | jq -r '.rule.description // empty')
          SEVERITY=$(echo "$ALERT_JSON" | jq -r '.rule.security_severity_level // .rule.severity // empty')
          TOOL_NAME=$(echo "$ALERT_JSON" | jq -r '.tool.name // empty')
          FILE_PATH=$(echo "$ALERT_JSON" | jq -r '.most_recent_instance.location.path // empty')
          START_LINE=$(echo "$ALERT_JSON" | jq -r '.most_recent_instance.location.start_line // empty')
          END_LINE=$(echo "$ALERT_JSON" | jq -r '.most_recent_instance.location.end_line // empty')
          HTML_URL=$(echo "$ALERT_JSON" | jq -r '.html_url // empty')
          CWES=$(echo "$ALERT_JSON" | jq -r '.rule.tags[]? // empty' \
            | grep -i '^cwe-' \
            | tr '\n' ', ' \
            | sed 's/,$//')

          REPO_FULL="${{ github.repository }}"

          echo "alert_number=${ALERT_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "rule_id=${RULE_ID}" >> "$GITHUB_OUTPUT"
          echo "rule_desc=${RULE_DESC}" >> "$GITHUB_OUTPUT"
          echo "severity=${SEVERITY}" >> "$GITHUB_OUTPUT"
          echo "tool=${TOOL_NAME}" >> "$GITHUB_OUTPUT"
          echo "file_path=${FILE_PATH}" >> "$GITHUB_OUTPUT"
          echo "start_line=${START_LINE}" >> "$GITHUB_OUTPUT"
          echo "end_line=${END_LINE}" >> "$GITHUB_OUTPUT"
          echo "html_url=${HTML_URL}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO_FULL}" >> "$GITHUB_OUTPUT"
          echo "cwes=${CWES}" >> "$GITHUB_OUTPUT"

          echo "Alert #${ALERT_NUMBER}: ${RULE_ID} (${SEVERITY}) in ${FILE_PATH}"

      - name: Check severity threshold
        id: gate
        run: |
          MIN="${MIN_SEVERITY:-}"
          SEVERITY="${{ steps.alert.outputs.severity }}"

          if [ -z "$MIN" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          severity_rank() {
            case "$1" in
              critical) echo 4 ;;
              high|error) echo 3 ;;
              medium|warning) echo 2 ;;
              low|note) echo 1 ;;
              *) echo 0 ;;
            esac
          }

          ALERT_RANK=$(severity_rank "$SEVERITY")
          MIN_RANK=$(severity_rank "$MIN")

          if [ "$ALERT_RANK" -lt "$MIN_RANK" ]; then
            echo "Skipping: alert severity '$SEVERITY' is below threshold '$MIN'"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build prompt
        if: steps.gate.outputs.skip == 'false'
        id: prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          ## Security Vulnerability Remediation

          **Repository:** ${{ steps.alert.outputs.repo }}
          **Scanner:** ${{ steps.alert.outputs.tool }}
          **Alert #:** ${{ steps.alert.outputs.alert_number }}
          **Rule:** ${{ steps.alert.outputs.rule_id }} — ${{ steps.alert.outputs.rule_desc }}
          **Severity:** ${{ steps.alert.outputs.severity }}
          **CWE(s):** ${{ steps.alert.outputs.cwes }}
          **Location:** `${{ steps.alert.outputs.file_path }}` (lines ${{ steps.alert.outputs.start_line }}–${{ steps.alert.outputs.end_line }})
          **Alert URL:** ${{ steps.alert.outputs.html_url }}

          ### Instructions

          1. Read and understand the CodeQL alert above.
          2. Investigate the affected file and surrounding code to understand the vulnerability context.
          3. Implement the minimal, correct fix for this vulnerability. Prefer using existing sanitization/validation libraries already in the codebase.
          4. Ensure your fix does not break existing functionality — run the test suite and linter.
          5. Create a PR with:
             - Title: `[Security] Fix ${{ steps.alert.outputs.rule_id }}: ${{ steps.alert.outputs.rule_desc }}`
             - Description that references the CodeQL alert, explains the vulnerability, and describes the fix.
             - Label: `security-fix`
          6. Comment on the CodeQL alert (if possible) with a link to the PR.

          ### Output Format
          ```json
          {
            "alert_number": <int>,
            "rule_id": "<string>",
            "severity": "<string>",
            "fix_applied": <bool>,
            "pr_url": "<string or null>",
            "fix_description": "<string>",
            "files_changed": ["<string>"],
            "tests_passed": <bool>,
            "confidence": <float 0-1>,
            "needs_human_review": <bool>,
            "review_notes": "<string or null>"
          }
          ```
          PROMPT_EOF

          PROMPT_JSON=$(cat /tmp/prompt.txt | jq -Rsa .)
          echo "prompt_json=${PROMPT_JSON}" >> "$GITHUB_OUTPUT"

      - name: Create Devin session
        if: steps.gate.outputs.skip == 'false'
        id: devin
        env:
          PROMPT_JSON: ${{ steps.prompt.outputs.prompt_json }}
        run: |
          BODY=$(jq -n --argjson prompt "$PROMPT_JSON" '{prompt: $prompt}')

          if [ -n "$DEVIN_PLAYBOOK_ID" ]; then
            BODY=$(echo "$BODY" | jq --arg pid "$DEVIN_PLAYBOOK_ID" '. + {playbook_id: $pid}')
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            SESSION_URL=$(echo "$RESPONSE_BODY" | jq -r '.url // empty')
            DEVIN_ID=$(echo "$RESPONSE_BODY" | jq -r '.devin_id // .session_id // empty')
            echo "session_url=${SESSION_URL}" >> "$GITHUB_OUTPUT"
            echo "devin_id=${DEVIN_ID}" >> "$GITHUB_OUTPUT"
            echo "Devin session created: ${SESSION_URL}"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE}): ${RESPONSE_BODY}"
            exit 1
          fi

      - name: Post tracking info
        if: steps.gate.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const alertNumber = ${{ steps.alert.outputs.alert_number }};
            const sessionUrl = '${{ steps.devin.outputs.session_url }}';
            const ruleId = '${{ steps.alert.outputs.rule_id }}';
            const severity = '${{ steps.alert.outputs.severity }}';

            console.log(`Devin session started for CodeQL alert #${alertNumber}`);
            console.log(`Rule: ${ruleId} | Severity: ${severity}`);
            console.log(`Session: ${sessionUrl}`);

            try {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: `Devin Security Fix: Alert #${alertNumber}`,
                head_sha: context.sha,
                status: 'in_progress',
                output: {
                  title: `Remediating ${ruleId} (${severity})`,
                  summary: `Devin is working on fixing CodeQL alert #${alertNumber}.\n\n` +
                           `**Rule:** ${ruleId}\n` +
                           `**Severity:** ${severity}\n` +
                           `**Session:** ${sessionUrl}`
                }
              });
            } catch (e) {
              console.log(`Note: Could not create check run: ${e.message}`);
              console.log('This is non-critical — the Devin session is still running.');
            }
